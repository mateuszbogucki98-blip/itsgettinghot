<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>itsgettinghot</title>
  <link rel="stylesheet" href="style.css" />
 <script src="[cdnjs.cloudflare.com](https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js)"><script>




</head>
<body>
  <main>
    <h1>itsgettinghot</h1>
    <h2>jak bardzo robi się ciepło?</h2>

    <input type="text" id="cityInput" placeholder="Wpisz miasto..." />
    <button id="loadBtn">Sprawdź</button>

    <canvas id="tempChart"></canvas>

    <div id="info">
      <p><strong>Średnia temperatura:</strong> <span id="avgTemp">–</span>°C</p>
      <p><strong>Nasłonecznienie:</strong> <span id="sunshine">–</span> h</p>
      <p><strong>Jakość powietrza (PM2.5):</strong> <span id="air">brak danych</span></p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
