<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>itsgettinghot</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <main>
    <header>
      <h1>it's getting <span>hot</span></h1>
      <h2>analiza klimatyczna polskich miast</h2>
    </header>

    <div class="search-row">
      <input type="text" id="cityInput" list="cityList" placeholder="wpisz miasto..." autocomplete="off" />
      <datalist id="cityList"></datalist>
      <button id="loadBtn">Sprawdź</button>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Średnia temp.</div>
        <div class="stat-value"><span id="avgTemp">–</span><span class="stat-unit">°C</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">Nasłonecznienie</div>
        <div class="stat-value"><span id="sunshine">–</span><span class="stat-unit">h/dzień</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">PM2.5</div>
        <div class="stat-value" style="font-size:1.2rem"><span id="air">brak danych</span></div>
      </div>
    </div>

    <div class="chart-wrapper">
      <div class="chart-header">Prognoza temperatur — 7 dni</div>
      <canvas id="tempChart"></canvas>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#e63946"></div>Rzeczywiste temperatury</div>
        <div class="legend-item"><div class="legend-dot" style="background:#457b9d"></div>Scenariusz -50% CO₂</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f4a261"></div>Stare prognozy IPCC AR4</div>
      </div>
    </div>

    <footer>Dane: Open-Meteo · OpenAQ · Est. IPCC AR4</footer>
  </main>
  <script src="script.js"></script>
</body>
</html>
